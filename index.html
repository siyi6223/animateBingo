<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思異的動畫世代賓果</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-content">
          <h1 id="page-title">思異的動畫世代賓果</h1>
          <p id="page-subtitle" class="hero-copy">
            橫向滑動表格並點選作品，支援三種語言切換與觀看狀態標記。
          </p>
        </div>
        <a
          class="threads-link"
          href="https://www.threads.com/@siyi6223"
          target="_blank"
          rel="noopener"
          aria-label="Threads @siyi6223"
        >
          <span class="threads-link__logo" aria-hidden="true">@</span>
        </a>
      </section>

      <section class="control-panel">
        <div class="control-group">
          <label for="range-filter" id="range-filter-label">表格範圍</label>
          <select id="range-filter">
            <option value="all">全部</option>
            <option value="10">最近 10 組</option>
            <option value="5">最近 5 組</option>
          </select>
        </div>

        <div class="control-group">
          <span id="language-label">語言</span>
          <div class="segmented-control">
            <button type="button" class="lang-button" data-lang="zh">中文</button>
            <button type="button" class="lang-button" data-lang="ja">日本語</button>
            <button type="button" class="lang-button" data-lang="en">English</button>
          </div>
        </div>
      </section>

      <section class="board-panel">
        <div class="board-header">
          <div class="board-title-row">
            <h2 id="board-title">思異的動畫世代賓果</h2>
            <div class="board-status-group">
              <span id="status-picker-label" class="board-status-label">觀看狀態</span>
              <div class="status-picker" role="group" aria-labelledby="status-picker-label">
                <button type="button" class="status-button" data-status="watched">
                  <span class="status-button__swatch swatch-selected"></span>
                  <span id="status-watched-label">已看</span>
                </button>
                <button type="button" class="status-button" data-status="partial">
                  <span class="status-button__swatch swatch-partial"></span>
                  <span id="status-partial-label">沒完整看完</span>
                </button>
                <button type="button" class="status-button" data-status="planned">
                  <span class="status-button__swatch swatch-planned"></span>
                  <span id="status-planned-label">我會去看</span>
                </button>
                <button type="button" class="status-button status-button--no-swatch" data-status="none">
                  <span id="status-none-label">未看</span>
                </button>
              </div>
            </div>
          </div>
          <div class="board-header-actions">
            <p id="watch-count" class="watch-count">已看 0，沒完整看完 0，我會去看 0，共 228</p>
            <div class="board-inline-actions">
              <button type="button" id="header-select-all-button" class="action-button primary action-button--compact">全部標成已看</button>
              <button type="button" id="header-clear-button" class="action-button action-button--compact">清除標記</button>
            </div>
          </div>
        </div>
        <div class="board-scroll">
          <div id="board" class="board" aria-live="polite"></div>
        </div>
      </section>

      <section class="action-bar">
        <button type="button" id="select-all-button" class="action-button primary">全部標成已看</button>
        <button type="button" id="clear-button" class="action-button">清除標記</button>
        <button type="button" id="export-button" class="action-button">匯出 PNG</button>
      </section>

      <footer class="site-footer">
        <p class="footer-lead" id="footer-lead">如果你一口氣追番到天亮，這裡也順便告訴你太陽什麼時候升起。</p>
        <div class="footer-widget-wrap">
          <aside class="sun-widget-card" aria-label="Sunrise and sunset widget">
            <iframe
              src="https://sunrise.linlinblog.com/widget/sunrise?city=taipei&theme=dark&lang=zh_TW"
              width="340"
              height="240"
              title="Sunrise & Sunset Widget"
            ></iframe>
            <div class="sun-widget-credit">
              <a
                href="https://sunrise.linlinblog.com/sunrise-sunset/taipei"
                target="_blank"
                rel="noopener"
              >
                查看台北日出日落資訊
              </a>
            </div>
          </aside>
        </div>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./script.js?v=export-canvas-20260619"></script>
  </body>
</html>
