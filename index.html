<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思異的動畫世代賓果</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-content">
          <h1 id="page-title">思異的動畫世代Bingo</h1>
          <p id="page-subtitle" class="hero-copy">
            可以左右滑動點選，並支援三種語言切換。
          </p>
        </div>
        <a
          class="threads-link"
          href="https://www.threads.com/@siyi6223"
          target="_blank"
          rel="noopener"
          aria-label="Threads @siyi6223"
        >
          <span class="threads-link__logo" aria-hidden="true">@</span>
        </a>
      </section>

      <section class="control-panel">
        <div class="control-group">
          <label for="range-filter" id="range-filter-label">表格長度</label>
          <select id="range-filter">
            <option value="all">全部</option>
            <option value="10">近10年</option>
            <option value="5">近5年</option>
          </select>
        </div>

        <div class="control-group">
          <span id="language-label">語言</span>
          <div class="segmented-control">
            <button type="button" class="lang-button" data-lang="zh">中文</button>
            <button type="button" class="lang-button" data-lang="ja">日本語</button>
            <button type="button" class="lang-button" data-lang="en">English</button>
          </div>
        </div>
      </section>

      <section class="board-panel">
        <div class="board-header">
          <div>
            <h2 id="board-title">思異的動畫世代賓果</h2>
          </div>
          <div class="board-header-actions">
            <p id="watch-count" class="watch-count">已看 0/228 部</p>
            <div class="board-inline-actions">
              <button type="button" id="header-select-all-button" class="action-button primary action-button--compact">全選</button>
              <button type="button" id="header-clear-button" class="action-button action-button--compact">清除</button>
            </div>
          </div>
        </div>
        <div class="board-scroll">
          <div id="board" class="board" aria-live="polite"></div>
        </div>
      </section>

      <section class="action-bar">
        <button type="button" id="select-all-button" class="action-button primary">全選</button>
        <button type="button" id="clear-button" class="action-button">清除</button>
        <button type="button" id="export-button" class="action-button">匯出 PNG</button>
      </section>

      <section class="legend-panel">
        <div class="legend-item">
          <span class="legend-swatch swatch-selected"></span>
          <span id="legend-watched">已看</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-default"></span>
          <span id="legend-not-watched">未看</span>
        </div>
      </section>

      <footer class="site-footer">
        <p class="footer-lead" id="footer-lead">如果不小心通宵追番，這裡可以幫你看幾點能看到日出</p>
        <div class="footer-widget-wrap">
          <aside class="sun-widget-card" aria-label="Sunrise and sunset widget">
            <iframe
              src="https://sunrise.linlinblog.com/widget/sunrise?city=taipei&theme=dark&lang=zh_TW"
              width="340"
              height="240"
              title="Sunrise & Sunset Widget"
            ></iframe>
            <div class="sun-widget-credit">
              <a
                href="https://sunrise.linlinblog.com/sunrise-sunset/taipei"
                target="_blank"
                rel="noopener"
              >
                台北・日出日落工具
              </a>
            </div>
          </aside>
        </div>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
